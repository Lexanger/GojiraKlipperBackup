[gcode_macro CLEAN_NOZZLE]
description: Wipes the nozzle on the silicone scrubber
# --- TUNE THESE VARIABLES BASED ON YOUR MOUNTING POSITION ---
variable_brush_x_start: 175    # One side of the scrubber
variable_brush_x_end:   245    # The other side
variable_brush_y:       350    # Y-position at the back gantry
variable_brush_z_safe:   20    # Height to clear bed/frame
variable_deploy_angle:   75    # Arm horizontal
variable_stow_angle:      8    # Arm retracted
variable_scrub_passes:    6    # Silicone often needs more quick "flicks"

gcode:
    {% set TH = printer.toolhead %}

    # Homing Check
    {% if TH.homed_axes != "xyz" %}
        G28
    {% endif %}

    # Save State & Prepare
    SAVE_GCODE_STATE NAME=clean_nozzle_state
    
    # Lift Z if too low
    {% if TH.position.z < brush_z_safe %}
        G0 Z{brush_z_safe} F1500
    {% endif %}

    # Move to back (Y first to clear Tap/Rails)
    G0 Y{brush_y} F5000
    G0 X{brush_x_start} F5000

    # Deploy and Wipe
    SET_SERVO SERVO=NozzleBrush ANGLE={variable_deploy_angle}
    G4 P500 # Dwell for servo arm

    # Perform the "Flicking" motion
    {% for pass in range(variable_scrub_passes) %}
        # Fast wiping motion (F6000) is usually better for silicone
        G0 X{brush_x_end} F6000
        G0 X{brush_x_start} F6000
    {% endfor %}

    # Cleanup
    G0 X{brush_x_start - 25} F5000 # Move X away from arm
    SET_SERVO SERVO=NozzleBrush ANGLE={variable_stow_angle}
    G4 P500
    
    RESTORE_GCODE_STATE NAME=clean_nozzle_state MOVE=1 MOVE_SPEED=5000