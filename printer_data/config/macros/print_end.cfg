[gcode_macro PRINT_END]
gcode:
    # Catch material type from slicer
    {% set material = params.MATERIAL|default('NONE')|string|upper %}

    # Extend idle timeout to 1 hour (3600s) to allow for plate cooling
    SET_IDLE_TIMEOUT TIMEOUT=3600

    # Calculate Safe Z and Center Coordinates
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set current_z = printer.toolhead.position.z|float %}
    
    {% if current_z < (max_z - 10.0) %}
        {% set z_safe = current_z + 10.0 %}
    {% else %}
        {% set z_safe = max_z %}
    {% endif %}

    {% set x_center = printer.toolhead.axis_maximum.x|float / 2.0 %}
    {% set y_center = printer.toolhead.axis_maximum.y|float / 2.0 %}

    # Apply Safe Z-Lift
    G90                      ; Switch to absolute positioning
    G1 Z{z_safe} F3000       ; Lift Z-axis safely without exceeding bounds

    # --- MMU Unload Bypass Logic ---
    {% if material == "TPU" %}
        RESPOND TYPE=echo MSG="TPU Detected: Bypassing MMU_END tip shaping and unload."
        MMU_ENABLE=1
    {% else %}
        RESPOND TYPE=echo MSG="Executing MMU_END for tip shaping and unload."
        MMU_END
    {% endif %}
    # -------------------------------

    # Turn off heaters instantly (Non-blocking)
    M104 S0 ; Turn off hotend
    M140 S0 ; Turn off bed

    # Position toolhead for active bed cooling (Dynamically centered)
    G1 X{x_center} Y{y_center} F6000 

    # Blast the part cooling fan
    M106 S255

    # Update status and trigger timers
    UPDATE_DELAYED_GCODE ID=PROGRESS_LED_LOOP DURATION=0  # Stop the background LED loop
    UPDATE_DELAYED_GCODE ID=exhaust_off DURATION=600      # Run Exhaust fan to finish cleaning chamber air
    
    # Trigger the Active Cooling Monitor
    M117 Active Cooling Started...
    UPDATE_DELAYED_GCODE ID=BED_COOLING_LOOP DURATION=1