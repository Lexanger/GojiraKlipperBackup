[include macros.cfg]
[gcode_macro PRINT_END]
gcode:
    # Turn off bed and hotend
    M190 S0
    M109 S0
    
    # Calculate Safe Z
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set current_z = printer.toolhead.position.z|float %}
    
    {% if current_z < (max_z - 10.0) %}
        {% set z_safe = current_z + 10.0 %}
    {% else %}
        {% set z_safe = max_z %}
    {% endif %}

    # Apply Safe Z-Lift and Park
    G90                      ; Switch to absolute positioning
    G1 Z{z_safe} F3000       ; Lift Z-axis safely without exceeding bounds
    G1 X50 Y300 F6000       ; Park the toolhead out of the way (Adjust X/Y to your preferred rear corner)
    
    # Update status and trigger exhaust timer
    UPDATE_DELAYED_GCODE ID=PROGRESS_LED_LOOP DURATION=0  # Stop the background loop
    STATUS_READY                                          # Return LEDs to normal standby colors
    UPDATE_DELAYED_GCODE ID=exhaust_off DURATION=600      # Run Exhaust fan to finish clenaing chamber air
    
    # Disable Steppers
    M84