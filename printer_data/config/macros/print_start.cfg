[gcode_macro PRINT_START]
gcode:
    # Fetch Slicer Data
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set target_chamber = params.CHAMBER|default(45)|int %}
    {% set current_chamber = printer["temperature_sensor chamber"].temperature | float %}
    {% set material = params.MATERIAL|default('NONE')|string|upper %} # Catch material type
    {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

    # Clear print end loops before starting a new print
    UPDATE_DELAYED_GCODE ID=BED_COOLING_LOOP DURATION=0
    UPDATE_DELAYED_GCODE ID=exhaust_off DURATION=0

    # Soften Residual Filament Before Homing 
    STATUS_HEATING
    M109 S150 # Heat hotend to 150c before any movement to ensure accurate Z-offset

    # Universal Homing Check
    STATUS_HOMING
    {% if printer.toolhead.homed_axes != "xyz" %}
        { action_respond_info("Printer not homed. Homing now...") }
        G28
    {% endif %}
    G90 # Set absolute positioning
    BED_MESH_CLEAR

    # --- MASTER ROUTING LOGIC ---
    {% if material == "TPU" %}
        
        # 1. TPU ROUTE (Total Bypass)
        MMU_ENCODER ENABLE=0
        RESPOND TYPE=echo MSG="TPU Detected: Skipping heatsoak. Heating bed to {target_bed}C."
        M190 S{target_bed} # Block and wait for bed to reach TPU temp
        
        # Instantly trigger Phase 2
        PRINT_START_PHASE_2 EXTRUDER={target_extruder} MATERIAL={material} FORCED_QGL=0
        
    {% elif target_bed > 90 and current_chamber < target_chamber %}
        
        # 2. COLD START / HEATSOAK ROUTE
        { action_respond_info("Chamber cold (%.1fC). Executing Cold Start Route." % current_chamber) }
        STATUS_HEATING
        M106 S255 # Turn on PT-fan to help heat the chamber

        # Do a baseline QGL before soaking if it hasn't been applied yet
        {% if not printer.quad_gantry_level.applied %}
            STATUS_LEVELING
            QUAD_GANTRY_LEVEL
            G28 Z
        {% endif %}

        # Go to center of the bed and start heating the bed
        G1 X{x_wait} Y{y_wait} Z15 F9000
        M140 S{target_bed} 

        # Fire off the Heatsoak. 
        # Pass MATERIAL along so Phase 2 still knows what is printing
        HEAT_SOAK TARGET={target_bed} SOAK_TEMP={target_chamber} COMPLETE="PRINT_START_PHASE_2 FORCED_QGL=1 EXTRUDER={target_extruder} MATERIAL={material}"
        BASE_PAUSE
        
    {% else %}
        
        # 3. HOT START / PLA ROUTE
        { action_respond_info("Chamber at temp or low bed temp. Skipping Heatsoak.") }
        STATUS_HEATING
        G1 X{x_wait} Y{y_wait} Z15 F9000
        M190 S{target_bed} # Wait for bed temp to stabilize

        # Ensure a QGL is applied while hot before moving on
        {% if not printer.quad_gantry_level.applied %}
            STATUS_LEVELING
            QUAD_GANTRY_LEVEL
            G28 Z
        {% endif %}

        # Jump straight to Phase 2. No forced QGL needed.
        PRINT_START_PHASE_2 FORCED_QGL=0 EXTRUDER={target_extruder} MATERIAL={material}
        
    {% endif %}


[gcode_macro PRINT_START_PHASE_2]
gcode:
    # Fetch Passed Variables
    {% set target_extruder = params.EXTRUDER|int %}
    {% set force_qgl = params.FORCED_QGL|default(0)|int %}
    {% set material = params.MATERIAL|default('NONE')|string|upper %} # <-- ADDED: Catch the material
    {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

    # Resume the virtual SD if we are coming out of a heatsoak pause
    BASE_RESUME

    # Hot QGL (If coming from a cold heatsoak)
    {% if force_qgl == 1 %}
        { action_respond_info("Heatsoak complete. Forcing Hot QGL to account for thermal expansion.") }
        STATUS_LEVELING
        QUAD_GANTRY_LEVEL
        G28 Z
    {% endif %}

    # Adaptive Bed Mesh
    STATUS_MESHING
    BED_MESH_CALIBRATE ADAPTIVE=1

    # Final Hotend Heating
    STATUS_HEATING
    G1 X{x_wait} Y{y_wait} Z15 F9000
    M107 # Turn off part cooling fan
    M109 S{target_extruder} # Heat the hotend to final set temp

    # MMU Load & Prime Bypass Logic
    {% if material == "TPU" %}
        RESPOND TYPE=echo MSG="TPU Print: Bypassing MMU Load. Ensure TPU is manually loaded into the extruder."
    {% else %}
        MMU_START_LOAD_INITIAL_TOOL
    {% endif %}

    STOP_HEATSOAK_LEDS
    STATUS_PRINTING
    STATUS_PROGRESS                                     # Set the initial red color
    UPDATE_DELAYED_GCODE ID=PROGRESS_LED_LOOP DURATION=10 # Start the 10-second background loop
    
    ADAPTIVE_PURGE