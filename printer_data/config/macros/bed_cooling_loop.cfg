[delayed_gcode BED_COOLING_LOOP]
gcode:
    # Define the temperature where your parts self-release
    {% set SAFE_TEMP = 35.0 %}
    # Read the current bed temperature
    {% set current_bed_temp = printer.heater_bed.temperature %}

    {% if current_bed_temp <= SAFE_TEMP %}
        # --- THE BED IS COOL ---
        M107 ; Turn off part cooling fan
        M117 Part Safe to Remove!

        # Move toolhead to your preferred maintenance/cutter park position
        G1 X50 Y300 F6000

        # Turn off stepper motors
        M84

        # Set Stealthburner LEDs to Ice Blue (Hex: #0080FF) to indicate Safe Release
        # Using the standard Neopixel command to override the status macros
        SET_LED LED="sb_leds" RED=0.0 GREEN=0.5 BLUE=1.0 SYNC=0 TRANSMIT=1

    {% else %}
        # --- THE BED IS STILL HOT ---
        # Loop this check again in 30 seconds
        UPDATE_DELAYED_GCODE ID=BED_COOLING_LOOP DURATION=30
    {% endif %}