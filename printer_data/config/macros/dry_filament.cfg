[gcode_macro DRY_FILAMENT]
description: Heats the bed and circulates air to dry filament. Usage: DRY_FILAMENT BED_TEMP=80 TIME_MINUTES=480
gcode:
    # 1. Fetch Variables and Defaults
    {% set target_bed = params.BED_TEMP|default(80)|float %}
    {% set time_minutes = params.TIME_MINUTES|default(480)|int %}
    {% set time_seconds = time_minutes * 60 %}
    
    # 2. Safety Check: Maximum Bed Temperature
    # (Adjust this max limit based on your bed and spool materials to prevent melting plastic spools)
    {% if target_bed > 100 %}
        {% set target_bed = 100 %}
        RESPOND TYPE=error MSG="Bed temperature clamped to 100C to prevent spool damage!"
    {% endif %}

    # 3. Prepare the Toolhead
    # Check if homed, home if not, then park the toolhead high and out of the way
    {% if printer.toolhead.homed_axes != "xyz" %}
        RESPOND TYPE=echo MSG="Homing printer before parking..."
        G28
    {% endif %}
    
    # Park near the top center to give maximum clearance for the spool
    {% set x_park = printer.toolhead.axis_maximum.x / 2 %}
    {% set y_park = printer.toolhead.axis_maximum.y / 2 %}
    {% set z_park = printer.toolhead.axis_maximum.z - 50 %}
    G90
    G1 X{x_park} Y{y_park} Z{z_park} F6000

    # 4. Start Heating and Circulation
    RESPOND TYPE=echo MSG="Starting filament drying cycle at {target_bed}C for {time_minutes} minutes."
    M140 S{target_bed} ; Set bed temp (non-blocking)
    M106 S255          ; Turn on part cooling fan to 100% to circulate air
    
    # Uncomment the line below if your Nevermore is configured as a standard pin instead of a heater_fan
    # SET_PIN PIN=nevermore VALUE=1 

    # 5. Start the Countdown Timer
    UPDATE_DELAYED_GCODE ID=DRYING_TIMER DURATION={time_seconds}


[gcode_macro STOP_DRYING]
description: Manually stops the drying cycle and turns off heaters/fans.
gcode:
    RESPOND TYPE=echo MSG="Stopping filament drying cycle manually."
    # Turn off background timer
    UPDATE_DELAYED_GCODE ID=DRYING_TIMER DURATION=0
    
    # Turn off heaters and fans
    M140 S0
    M106 S0
    # SET_PIN PIN=nevermore VALUE=0 


[delayed_gcode DRYING_TIMER]
gcode:
    RESPOND TYPE=echo MSG="Filament drying time complete. Turning off heaters."
    # Turn off heaters and fans
    M140 S0
    M106 S0
    # SET_PIN PIN=nevermore VALUE=0
    
    # Optional: Turn off the chamber exhaust fan if you had it running
    UPDATE_DELAYED_GCODE ID=exhaust_off DURATION=1