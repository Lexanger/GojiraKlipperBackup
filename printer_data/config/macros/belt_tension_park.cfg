#####################################################################
#   Universal Belt Tension Parking Macro
#####################################################################
#
# Description:
# This macro dynamically calculates the exact parking coordinates 
# required for acoustic belt tensioning based on your printer's size.
# It automatically adapts to Voron 2.4, Trident, and V0 dimensions.
#
# How it works:
# - Centers the X and Z axes.
# - Parks the Y-axis at exactly 150mm from the front idlers (Standard),
#   or at absolute Y-Max for micro-printers (like the V0).
# - Disables X and Y motors so you can physically adjust the tensioners.
#
# Usage:
# 1. Run PARK_FOR_BELT_TENSION from your console or macro interface.
# 2. Open a spectrum analyzer app (e.g., Spectroid, Guitar Tuner).
# 3. Pluck the exposed belt halfway between the toolhead and front idlers.
# 4. Adjust your tensioners until both A and B belts resonate at ~110Hz.
#
# Dependencies:
# Requires the CG28 (Conditional Home) macro to prevent unnecessary homing.
#####################################################################

[gcode_macro PARK_FOR_BELT_TENSION]
description: Parks toolhead dynamically based on print volume for acoustic tuning
gcode:
    CG28 ; Conditional homing
    
    # Fetch the printer's physical dimensions from Klipper
    {% set max_x = printer.toolhead.axis_maximum.x | float %}
    {% set max_y = printer.toolhead.axis_maximum.y | float %}
    {% set max_z = printer.toolhead.axis_maximum.z | float %}
    
    # Calculate the exact center of the X and Z axes
    {% set mid_x = max_x / 2.0 %}
    {% set mid_z = max_z / 2.0 %}
    
    # Auto-determine Y-position based on printer size
    # Large printers park at exactly 150mm. Micro printers park at absolute Y-Max.
    {% if max_y >= 150 %}
        {% set tune_y = 150 %}
    {% else %}
        {% set tune_y = max_y %}
    {% endif %}

    G90
    # Move to calculated X center, the tuning Y, and calculated Z center
    G1 X{mid_x} Y{tune_y} Z{mid_z} F6000
    
    RESPOND TYPE=command MSG="Toolhead parked at X:{mid_x} Y:{tune_y}. Pluck the belts! Target: ~110Hz."
    
    # Turn off X and Y motors so you can physically adjust the tensioners
    M84 X Y