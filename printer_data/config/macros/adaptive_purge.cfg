[gcode_macro ADAPTIVE_PURGE]
description: Smart purge that chooses X or Y axis based on available bed space
gcode:
    # --- Configuration ---
    {% set purge_len = 40.0 %}         # Length of the purge line
    {% set purge_ext = 30.0 %}         # Amount of filament to extrude
    {% set clearance = 10.0 %}         # Distance from the printed object
    {% set z_height = 0.4 %}           # Z height for purging

    # --- Fetch Machine Limits ---
    {% set bed_min_x = printer.toolhead.axis_minimum.x | float %}
    {% set bed_min_y = printer.toolhead.axis_minimum.y | float %}
    {% set bed_max_x = printer.toolhead.axis_maximum.x | float %}
    {% set bed_max_y = printer.toolhead.axis_maximum.y | float %}

    # --- Bounding Box Calculation ---
    {% set ns = namespace(min_x=bed_max_x, min_y=bed_max_y) %}
    {% if printer.exclude_object is defined and printer.exclude_object.objects %}
        {% for object in printer.exclude_object.objects %}
            {% for point in object.polygon %}
                {% if point[0] < ns.min_x %} {% set ns.min_x = point[0] %} {% endif %}
                {% if point[1] < ns.min_y %} {% set ns.min_y = point[1] %} {% endif %}
            {% endfor %}
        {% endfor %}
    {% else %}
        {% set ns.min_x = bed_min_x + 30.0 %}
        {% set ns.min_y = bed_min_y + 30.0 %}
    {% endif %}

    # --- Space Logic Check ---
    {% set space_front = ns.min_y - bed_min_y %}
    {% set space_left = ns.min_x - bed_min_x %}

    # Define final coordinates (placeholders)
    {% set start_x = 0.0 %}
    {% set start_y = 0.0 %}
    {% set end_x = 0.0 %}
    {% set end_y = 0.0 %}

    {% if space_front >= (clearance + 5.0) %}
        # OPTION 1: X-AXIS (Horizontal line in front of object)
        RESPOND TYPE=echo MSG="[Adaptive Purge] Choosing X-axis (Front)"
        {% set start_x = ns.min_x %}
        {% set start_y = ns.min_y - clearance %}
        {% set end_x = start_x + purge_len %}
        {% set end_y = start_y %}
    {% elif space_left >= (clearance + 5.0) %}
        # OPTION 2: Y-AXIS (Vertical line to the left of object)
        RESPOND TYPE=echo MSG="[Adaptive Purge] Choosing Y-axis (Left)"
        {% set start_x = ns.min_x - clearance %}
        {% set start_y = ns.min_y %}
        {% set end_x = start_x %}
        {% set end_y = start_y + purge_len %}
    {% else %}
        # FALLBACK: Bed Corner (Print is too close to both edges)
        RESPOND TYPE=echo MSG="[Adaptive Purge] Using Fallback Corner"
        {% set start_x = bed_min_x + 5.0 %}
        {% set start_y = bed_min_y + 5.0 %}
        {% set end_x = start_x + purge_len %}
        {% set end_y = start_y %}
    {% endif %}

    # --- Safety Clamping ---
    # Final check to ensure we don't try to purge off the right or back of the bed
    {% if end_x > bed_max_x - 5.0 %} {% set end_x = start_x - purge_len %} {% endif %}
    {% if end_y > bed_max_y - 5.0 %} {% set end_y = start_y - purge_len %} {% endif %}

    # --- Execution ---
    SAVE_GCODE_STATE NAME=adaptive_purge_state
    G90 # Absolute Pos
    M83 # Relative Extruder
    G1 X{start_x} Y{start_y} Z5.0 F9000
    G1 Z{z_height} F1500
    G1 X{end_x} Y{end_y} E{purge_ext} F500
    G1 E-0.5 F2100 # Tiny retraction
    G1 Z5.0 F3000   # Lift
    RESTORE_GCODE_STATE NAME=adaptive_purge_state