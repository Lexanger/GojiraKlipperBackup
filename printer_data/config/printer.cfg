##	if your fan is not able to slow down effectively
#off_below: 0.10

#[heater_fan hotend_fan]
##	Hotend Fan - CNC_FAN1
#pin: PF9
#max_power: 1.0
#kick_start_time: 0.5
#heater: extruder
#heater_temp: 50.0
##	If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0

[heater_fan controller_fan]
##	Controller fan - CNC_FAN2
pin: PF7
kick_start_time: 0.5
heater: heater_bed
heater_temp: 40.0

[heater_fan controller_fan]
##	Controller fan - CNC_FAN2
pin: PF9
kick_start_time: 0.5
heater: heater_bed
heater_temp: 40.0


