# This file contains common pin mappings for the BIGTREETECH Manta M8P V2.0
# To use this config, the firmware should be compiled for the
# STM32H723 with a "8KiB bootloader" and USB communication.

# This config is currently only correct for V2.0 boards
# 
# See docs/Config_Reference.md for a description of parameters.
[include ebbcan.cfg]
[include mainsail.cfg]
[include macros.cfg]
[include shakentune.cfg]
[include sbled.cfg]
[include print_start.cfg]
[include print_end.cfg]
[include calibrate_flow.cfg]


[mcu]
canbus_uuid: 1910c0d87aec

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 3000    			#Max 4000
max_z_velocity: 25 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

[temperature_sensor MCU]
sensor_type: temperature_mcu

[temperature_sensor SoC]
sensor_type: temperature_host

[exclude_object]

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

## Y Stepper on Motor2(A Motor)
[stepper_y]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: ^PF3 
position_min: 0
##	Uncomment for 350mm build
position_endstop: 350
position_max: 350
homing_speed: 25   #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y]
uart_pin: PC13
interpolate: True
run_current: 1.0
sense_resistor: 0.110
#stealthchop_threshold: 99999

## X Stepper on Motor1 (B Motor)
[stepper_x]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: EBBCan:gpio24
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 25  #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_x]
uart_pin: PE3
interpolate: True
run_current: 1.0
sense_resistor: 0.110
#stealthchop_threshold: 99999

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left on Motor3
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -3
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PB9
interpolate: true
run_current: 0.8
sense_resistor: 0.110
#stealthchop_threshold: 99999

##	Z1 Stepper - Rear Left on Motor4
[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: true
run_current: 0.8
sense_resistor: 0.110
#stealthchop_threshold: 99999

##	Z2 Stepper - Rear Right on Motor5
[stepper_z2]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PG14
interpolate: true
run_current: 0.8
sense_resistor: 0.110
#stealthchop_threshold: 99999

##	Z3 Stepper - Front Right on Motor6
[stepper_z3]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z3]
uart_pin: PG10
interpolate: true
run_current: 0.8
sense_resistor: 0.110
#stealthchop_threshold: 99999


#####################################################################
# 	Extruder
#####################################################################

[extruder]
step_pin: EBBCan:gpio18
dir_pin: EBBCan:gpio19
enable_pin: !EBBCan:gpio17
microsteps: 16
gear_ratio: 50:10
rotation_distance: 21.998582567
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 101
#heater_pin: EBBCan:gpio7
#control: pid
#pid_Kp: 25.673 
#pid_Ki: 1.802 
#pid_Kd: 91.458
min_temp: 0
max_temp: 300
sensor_type: MAX31865
sensor_pin: EBBCan:gpio9
spi_software_sclk_pin: EBBCan:gpio10
spi_software_mosi_pin: EBBCan:gpio8
spi_software_miso_pin: EBBCan:gpio11
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 2

[tmc2209 extruder]
uart_pin: EBBCan:gpio20
run_current: 0.650


#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
##	SSR Pin - HE1
heater_pin: PA1
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for NTC 100k 3950 thermistors
sensor_type: Generic 3950
sensor_pin: PB1
##  Adjust max_power so it doesn't exceed the SSR rating. The Omron G3NA-210B-DC5 SSR is rated at 4 amps without a heatsink.
##  The formula is "4 / (Wattage_of_bed_heater / Mains_voltage) = max_power"
##  If max_power is greater than 1.0, use 1.0
max_power: 0.63 #possibly .73
min_temp: 0
max_temp: 120
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769


#####################################################################
# 	Fan Control
#####################################################################



[controller_fan controller_fan]
pin: PF7
kick_start_time: 0.5
max_power: 0.6
#heater: heater_bed
#heater_temp: 40.0

[controller_fan controller_fan1]
pin: PF9
kick_start_time: 0.5
max_power: 0.6
#heater: heater_bed
#heater_temp: 40.0

#nevermore
[heater_fan nevermore]
pin: PF6
heater: heater_bed
heater_temp: 70.0
fan_speed: 0.5
#value: 0.0
#shutdown_value: 0

#exhuast
[fan_generic exhuast]
pin: PF8
kick_start_time: 0.5

#####################################################################
# 	LED Control
#####################################################################
#setup as led in klipper screen?

[output_pin caselight]
# Chamber Lighting - HE2 Connector (Optional)
pin: PA3
pwm:true
shutdown_value: 0
value: 1.0
cycle_time: 0.01

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[safe_z_home]
##	XY Location of the Z Endstop Switch
##	Update -10,-10 to the XY coordinates of your endstop pin 
##	(such as 157,305) after going through Z Endstop Pin
##	Location Definition step.
home_xy_position: 175, 175
speed:100
z_hop:10
move_to_previous: False

[quad_gantry_level]
##	Use QUAD_GANTRY_LEVEL to level a gantry.
##	Min & Max gantry corners - measure from nozzle at MIN (0,0) and 
##	MAX (250, 250), (300,300), or (350,350) depending on your printer size
##	to respective belt positions
##	Gantry Corners for 350mm Build

gantry_corners:
	-60,-10
	410,420
#	Probe points
points:
	50,50
	50,300
	300,300
	300,50

speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10

#####################################################################
# 	Meshing
#####################################################################

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 5, 5
mesh_max: 345, 345
mesh_pps: 0
probe_count: 27, 27
adaptive_margin: 5

#####################################################################
# 	Input Shaping
#####################################################################
[input_shaper]
shaper_freq_x: 48.8
shaper_freq_y: 34.2
shaper_type: mzv

#####################################################################
# 	TMC Autotune
#####################################################################

[autotune_tmc stepper_x]
motor: moons-ms17hd6p420I-04
tuning_goal: performance

[autotune_tmc stepper_y]
motor: moons-ms17hd6p420I-04
tuning_goal: performance

[autotune_tmc stepper_z]
motor: moons-ms17hd6p420I-04
tuning_goal: silent

[autotune_tmc stepper_z1]
motor: moons-ms17hd6p420I-04
tuning_goal: silent

[autotune_tmc stepper_z2]
motor: moons-ms17hd6p420I-04
tuning_goal: silent

[autotune_tmc stepper_z3]
motor: moons-ms17hd6p420I-04
tuning_goal: silent

[autotune_tmc extruder]
motor: moons-cse14hra1l410a
tuning_goal: performance

#####################################################################
# 	Macros
#####################################################################

[gcode_macro G32]
gcode:
    BED_MESH_CLEAR
    G28
    QUAD_GANTRY_LEVEL
    G28   
    G0 X175 Y175 Z30 F3600

